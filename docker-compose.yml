# Self-contained Kafka GUI. Bring your own Kafka — point clusters at remote
# brokers through the in-app UI (Settings → add cluster) or via the seed env
# vars below. The kafkagui-data volume persists cluster configs and host
# aliases across restarts.
#
#   docker compose up        # starts backend + frontend; first run builds images (~2 min)
#   docker compose up -d     # detached
#   docker compose down      # stop (volume kept)
#   docker compose down -v   # stop and wipe persisted configs
#
# Reaching the host's own Kafka from inside the backend container: use
# `host.docker.internal:9092` (Docker Desktop) or the host's LAN IP — NOT
# `localhost:9092`, which resolves to the container itself.
#
# Brokers that advertise a non-resolvable hostname: add an entry in
# Settings → Host aliases (no compose edits needed).

services:
  backend:
    build:
      context: ./backend
    image: kafkaui-backend:latest
    container_name: kafkagui-backend
    ports:
      - "8080:8080"
    environment:
      # Optional seed cluster — set KAFKAGUI_BOOTSTRAP_SERVERS in your shell or a .env file
      # (see .env.example) to auto-connect on boot; leave blank to add clusters via the UI.
      KAFKAGUI_BOOTSTRAP_SERVERS: "${KAFKAGUI_BOOTSTRAP_SERVERS:-}"
      KAFKAGUI_CORS_ALLOWED_ORIGINS: "${KAFKAGUI_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001}"
    volumes:
      - kafkagui-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    image: kafkaui-frontend:latest
    container_name: kafkagui-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      # Browser-side: API runs on the host's exposed port, not inside the docker network.
      NEXT_PUBLIC_API_BASE: http://localhost:8080/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws
    healthcheck:
      # Use 127.0.0.1, not localhost: alpine resolves localhost → ::1 (IPv6) but Next.js binds IPv4 only.
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

networks:
  default:
    name: kafkagui-network

volumes:
  kafkagui-data:
