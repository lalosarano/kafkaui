<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1280"/>
  <title>Kafka GUI · prod-use1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body data-theme="dark" data-density="compact">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="dashboard.jsx"></script>
  <script type="text/babel" src="topics.jsx"></script>
  <script type="text/babel" src="topic-detail.jsx"></script>
  <script type="text/babel" src="other-pages.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "dark",
      "density": "compact",
      "accentHue": 180,
      "sidebarCollapsed": false,
      "liveAnim": true,
      "monoFont": "JetBrains Mono"
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [route, setRoute] = useState({ page: "dashboard" });
      const [cmdkOpen, setCmdkOpen] = useState(false);
      const [produceOpen, setProduceOpen] = useState(false);
      const [produceTopic, setProduceTopic] = useState(null);
      const [collapsed, setCollapsedLocal] = useState(tweaks.sidebarCollapsed);
      const { push: toast, ToastStack } = useToasts();

      // sync tweaks → DOM
      useEffect(() => {
        document.body.dataset.theme = tweaks.theme;
        document.body.dataset.density = tweaks.density;
        document.documentElement.style.setProperty("--accent", `oklch(${tweaks.theme === "dark" ? 0.68 : 0.52} ${tweaks.theme === "dark" ? 0.13 : 0.16} ${tweaks.accentHue})`);
        document.documentElement.style.setProperty("--accent-2", `oklch(${tweaks.theme === "dark" ? 0.74 : 0.46} ${tweaks.theme === "dark" ? 0.13 : 0.18} ${tweaks.accentHue})`);
        document.documentElement.style.setProperty("--accent-soft", tweaks.theme === "dark" ? `oklch(0.30 0.06 ${tweaks.accentHue} / 0.18)` : `oklch(0.96 0.025 ${tweaks.accentHue})`);
        document.documentElement.style.setProperty("--accent-bg", tweaks.theme === "dark" ? `oklch(0.30 0.08 ${tweaks.accentHue} / 0.35)` : `oklch(0.94 0.04 ${tweaks.accentHue})`);
        document.documentElement.style.setProperty("--font-mono", `"${tweaks.monoFont}", ui-monospace, "SF Mono", Menlo, monospace`);
      }, [tweaks]);

      useEffect(() => { setCollapsedLocal(tweaks.sidebarCollapsed); }, [tweaks.sidebarCollapsed]);

      // global shortcuts
      useEffect(() => {
        const onKey = (e) => {
          if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
            e.preventDefault(); setCmdkOpen(o => !o);
          }
          if (e.key === "/" && document.activeElement?.tagName !== "INPUT" && document.activeElement?.tagName !== "TEXTAREA") {
            e.preventDefault(); setCmdkOpen(true);
          }
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, []);

      const openProduce = useCallback((topic) => {
        setProduceTopic(topic || null);
        setProduceOpen(true);
      }, []);

      // Apply create flag from cmdk
      useEffect(() => {
        if (route.create) {
          // hand off to topics list which handles modal — for simplicity, just nav there
        }
      }, [route]);

      return (
        <>
          <div className="app" data-collapsed={collapsed}>
            <Sidebar route={route} setRoute={setRoute}
                     collapsed={collapsed}
                     setCollapsed={(c) => { const v = typeof c === "function" ? c(collapsed) : c; setCollapsedLocal(v); setTweak("sidebarCollapsed", v); }}/>
            <main className="main">
              <Topbar route={route} setRoute={setRoute} openCmdK={() => setCmdkOpen(true)}/>
              <div className="content">
                {route.page === "dashboard" && <DashboardPage tweaks={tweaks} setRoute={setRoute} openProduce={() => openProduce()}/>}
                {route.page === "topics" && !route.topic && <TopicsListPage setRoute={setRoute} openProduce={openProduce} tweaks={tweaks}/>}
                {route.page === "topics" && route.topic && <TopicDetailPage topicName={route.topic} setRoute={setRoute} openProduce={openProduce} tweaks={tweaks}/>}
                {route.page === "consumers" && <ConsumersPage setRoute={setRoute} route={route}/>}
                {route.page === "schemas" && <SchemasPage/>}
                {route.page === "acls" && <AclsPage/>}
                {route.page === "brokers" && <BrokersPage/>}
                {route.page === "settings" && <SettingsPage/>}
              </div>
            </main>
          </div>

          <CommandPalette open={cmdkOpen} onClose={() => setCmdkOpen(false)} setRoute={setRoute} openProduce={openProduce}/>
          <ProduceModal open={produceOpen} onClose={() => setProduceOpen(false)} defaultTopic={produceTopic} toast={toast}/>
          <ToastStack/>

          <TweaksPanel>
            <TweakSection label="Theme"/>
            <TweakRadio label="Mode" value={tweaks.theme} options={[{value:"dark",label:"Dark"},{value:"light",label:"Light"}]} onChange={v => setTweak("theme", v)}/>
            <TweakSlider label="Accent hue" value={tweaks.accentHue} min={0} max={360} step={5} unit="°" onChange={v => setTweak("accentHue", v)}/>
            <TweakSection label="Layout"/>
            <TweakRadio label="Density" value={tweaks.density} options={["compact", "comfortable"]} onChange={v => setTweak("density", v)}/>
            <TweakToggle label="Sidebar collapsed" value={tweaks.sidebarCollapsed} onChange={v => setTweak("sidebarCollapsed", v)}/>
            <TweakSection label="Behavior"/>
            <TweakToggle label="Live data animation" value={tweaks.liveAnim} onChange={v => setTweak("liveAnim", v)}/>
            <TweakSelect label="Monospace font" value={tweaks.monoFont}
                         options={["JetBrains Mono", "IBM Plex Mono", "Geist Mono", "Fira Code"]}
                         onChange={v => setTweak("monoFont", v)}/>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
